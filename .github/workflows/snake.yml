name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    # 核心修复 1：赋予 Actions 写入仓库的权限，解决 exit code 128 错误
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 2794223933
          # 核心修复 2：移除了不支持的参数，只保留正确的 outputs 配置
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=orange&color_dots=#9eca4f,#63a3ff,#ff79c6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
